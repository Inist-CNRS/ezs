name: CI 100% Bun

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          CXXFLAGS: "-I/deps/include"
          LDFLAGS: "-L/deps/lib"
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run Tests with Bun Test
        env:
          LD_LIBRARY_PATH: "/deps/lib"
          DEBUG: "ezs:error,ezs:warn"
          NODE_ENV: test
        # --coverage génère automatiquement un dossier ./coverage/
        run: bun test --coverage

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Bun génère du LCOV par défaut dans le dossier coverage
          file: ./coverage/lcov.info
